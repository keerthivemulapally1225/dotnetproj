name: terraform infra&deploy 
on:
    workflow_dispatch:
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: azure login
              uses: azure/login@v1
              with:
                creds: ${{ secrets.AZURE_SECRET }}
            - name: setup terraform
              uses: hashicorp/setup-terraform@v3
            - name: terraform init
              working-directory: Terraform
              run: terraform init
            - name: terraform apply
              working-directory: Terraform
              run: terraform apply -auto-approve
            - name: setup dotnet
              uses: actions/setup-dotnet@v6
              with:
                dotnet-version: '10.0.x'
            - name: restore dependencies
              run: |
                cd urbancompany
                dotnet restore
            - name: publish
              run: |
                cd urbancompany/urbancompany
                dotnet publish urbancompany.csproj -c Release -o publish
            - name: deploy to azure
              uses: azure/webapps-deploy@v2
              with:
                app-name: ucwebapp1225
                package: publish
            